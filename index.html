<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Kuis Lengkap Palang Merah & Bulan Sabit Merah</title>
    <style>
        :root {
            --primary-color: #e63946;
            --secondary-color: #1d3557;
            --background-color: #f8f9fa;
            --card-color: #ffffff;
            --text-color: #2b2d42;
            --correct-color: #4ade80;
            --correct-border: #22c55e;
            --wrong-color: #f87171;
            --wrong-border: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .quiz-container {
            background-color: var(--card-color);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            width: 100%;
            padding: 30px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid #f1faee;
            padding-bottom: 10px;
            font-size: 22px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            color: #6c757d;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .progress-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            height: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f1faee;
            border: 2px solid #a8dadc;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-family: inherit;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #a8dadc;
            border-color: #457b9d;
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            border-color: var(--correct-border) !important;
            color: #ffffff !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            border-color: var(--wrong-border) !important;
            color: #ffffff !important;
        }

        /* Style Kotak Pembahasan Sesuai Contoh Gambar */
        .explanation-box {
            display: none;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-left: 4px solid #ffb703;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4a4a4a;
        }
        .btn-next:hover {
            background-color: #112233;
        }

        .score-container {
            text-align: center;
            padding: 20px 0;
        }

        .score-num {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background-color: #c1121f;
        }
    </style>
</head>

            question: "Pasukan Penolong Pertama yang dibentuk oleh cabang-cabang PMI pada awal kemerdekaan untuk membantu korban pertempuran disebut...", 
            options: ["Korps Sukarela", "Mobile Colone", "Tenaga Sukarela", "Sibat"], 
            correct: 1,
            pembahasan: "Mobile Colone adalah barisan unit ambulans dan pertolongan pertama lapangan bergerak yang dibentuk PMI untuk mengamankan korban pertempuran kemerdekaan RI."
        },
        {
         question: "Tujuh landasan moril yang digunakan sebagai pedoman hidup organisasi Palang Merah di seluruh dunia secara kolektif disebut...", 
            options: ["Dasa Darma Gerakan", "Prinsip Dasar Gerakan Palang Merah dan Bulan Sabit Merah Internasional", "Kode Etik Sukarelawan Dunia", "Tri Bakti Palang Merah Remaja"], 
            correct: 1,
            pembahasan: "Tujuh Prinsip Dasar (Kemanusiaan, Kesamaan, Kenetralan, Kemandirian, Kesukarelaan, Kesatuan, Kesemestaan) merupakan aturan moral tertinggi bagi relawan dunia."
        },
        { 
            question: "Sesuai prinsip Kesukarelaan, gerakan pemberian bantuan dilakukan atas dasar komitmen pribadi tanpa ada unsur keinginan mencari...", 
            options: ["Pengalaman organisasi", "Keuntungan finansial / materi", "Sertifikat penghargaan", "Relasi internasional"], 
            correct: 1,
            pembahasan: "Prinsip Kesukarelaan (Voluntary Service) menggarisbawahi bahwa kegiatan kemanusiaan tidak didorong oleh motif mencari laba uang atau imbalan materi."
        },

        // --- 5 SOAL ESAI YANG DIUBAH MENJADI PG ---
        { 
            question: "Manakah pasangan tingkatan PMR berdasarkan usia beserta warna atributnya yang BENAR?", 
            options: [
                "Mula (10-12 thn - Hijau), Madya (12-15 thn - Biru), Wira (15-17 thn - Kuning)",
                "Mula (12-15 thn - Biru), Madya (10-12 thn - Hijau), Wira (15-17 thn - Kuning)",
                "Mula (10-12 thn - Kuning), Madya (12-15 thn - Biru), Wira (15-17 thn - Hijau)",
                "Mula (10-12 thn - Hijau), Madya (15-17 thn - Kuning), Wira (12-15 thn - Biru)"
            ], 
            correct: 0,
            pembahasan: "Atribut resmi warna list Slayer/Scarf PMR di Indonesia diatur: PMR Mula menggunakan warna Hijau, PMR Madya warna Biru, dan PMR Wira warna Kuning Cerah."
        },
        { 
            question: "Yang manakah susunan lengkap dari isi pokok 'Tri Bakti PMR'?", 
            options: [
                "Meningkatkan keterampilan hidup sehat, berkarya dan berbakti di masyarakat, mempererat persahabatan nasional dan internasional",
                "Menjaga ketertiban kelas, melatih fisik prajurit, mengumpulkan dana bantuan kemanusiaan",
                "Mengikuti upacara bendera, mematuhi perintah guru, menolong teman satu bangku sekolah",
                "Mempelajari hukum perang, mendirikan posko pengungsian mandiri, mencari anggota donor darah baru"
            ], 
            correct: 0,
            pembahasan: "Tiga janji komitmen pokok PMR adalah: 1) Meningkatkan keterampilan hidup sehat, 2) Berkarya dan berbakti di masyarakat, 3) Mempererat persahabatan nasional dan internasional."
        },
        { 
            question: "Berikut ini yang termasuk salah satu syarat mutlak agar suatu Perhimpunan Nasional dapat diakui secara resmi oleh Gerakan Internasional adalah...", 
            options: [
                "Merupakan satu-satunya perhimpunan nasional di negaranya dan diakui pemerintah sah",
                "Harus dipimpin langsung oleh presiden atau wakil presiden negara bersangkutan",
                "Wajib memiliki cabang aktif di minimal 50 negara asing",
                "Memungut biaya keanggotaan komersial bulanan untuk biaya operasional"
            ], 
            correct: 0,
            pembahasan: "Salah satu dari 10 syarat pengakuan ICRC adalah Perhimpunan Nasional harus berdiri di negara berdaulat, menjadi satu-satunya organisasi kepalangmerahan nasional di negara tersebut, dan diakui resmi oleh pemerintahnya."
        },
        { 
            question: "Manakah pernyataan yang paling akurat membedakan spesialisasi tugas antara ICRC dan IFRC?", 
            options: [
                "ICRC fokus pada konflik bersenjata/perang, sedangkan IFRC fokus pada penanganan bencana alam di masa damai",
                "ICRC bertugas menggalang dana komersial, sedangkan IFRC bertugas melatih dokter spesialis bedah",
                "ICRC fokus menangani anak-anak sekolah, sedangkan IFRC khusus menangani militer resmi",
                "ICRC mengurusi wilayah Asia saja, sedangkan IFRC bergerak di wilayah benua Eropa dan Amerika"
            ], 
            correct: 0,
            pembahasan: "Spesialisasi ICRC adalah ranah konflik/perang (penjaga hukum humaniter), sedangkan IFRC bergerak memimpin pemulihan krisis akibat bencana alam global di situasi damai."
        },
        { 
            question: "Prinsip dasar yang menegaskan bahwa di dalam satu negara hanya boleh ada satu organisasi Perhimpunan Palang Merah atau Bulan Sabit Merah dinamakan prinsip...", 
            options: ["Kesamaan", "Kesatuan", "Kenetralan", "Kesemestaan"], 
            correct: 1,
            pembahasan: "Berdasarkan aturan universal Gerakan, satu negara berdaulat dilarang dualisme organisasi kepalangmerahan. Hal ini diatur tegas oleh Prinsip Kesatuan (Unity)."
        }
    ];

    let currentQuiz = 0;
    let score = 0;
    let answered = false;
    const letters = ['A', 'B', 'C', 'D'];

    // Mengacak urutan soal secara acak agar bervariasi tiap kali reload
    quizData.sort(() => Math.random() - 0.5);

    // Muat soal pertama kali
    loadQuiz();

    function loadQuiz() {
        answered = false;
        document.getElementById('nextBtn').style.display = 'none';
        
        // Sembunyikan kotak pembahasan di setiap soal baru
        document.getElementById('pembahasan-box').style.display = 'none';
        
        const currentData = quizData[currentQuiz];
        
        // Update Info teks & Progress Bar
        document.getElementById('progress-text').innerText = `Pertanyaan ${currentQuiz + 1} dari ${quizData.length}`;
        document.getElementById('p-bar').style.width = `${((currentQuiz) / quizData.length) * 100}%`;
        
        // Set Soal
        document.getElementById('question-text').innerText = currentData.question;
        
        // Set Pilihan Opsi Tombol
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = currentData.options.map((option, index) => `
            <button class="option-btn" id="opt-${index}" onclick="selectOption(${index})">${letters[index]}. ${option}</button>
        `).join('');
    }

    function selectOption(optionIndex) {
        if (answered) return; 
        answered = true;

        const currentData = quizData[currentQuiz];
        const correctIdx = currentData.correct;

        // Kunci semua tombol agar tidak bisa diklik ulang
        const buttons = document.getElementsByClassName('option-btn');
        for (let btn of buttons) {
            btn.disabled = true;
        }

        // Logika pewarnaan benar / salah
        if (optionIndex === correctIdx) {
            document.getElementById(`opt-${optionIndex}`).classList.add('correct');
            score++;
            document.getElementById('live-score').innerText = `Skor: ${score}`;
        } else {
            document.getElementById(`opt-${optionIndex}`).classList.add('wrong');
            document.getElementById(`opt-${correctIdx}`).classList.add('correct');
        }

        // --- MEMUNCULKAN KOTAK PEMBAHASAN DETIK ITU JUGA ---
        const pembBox = document.getElementById('pembahasan-box');
        pembBox.innerHTML = `<strong>💡 Pembahasan:</strong> Kunci Jawaban (<strong>${letters[correctIdx]}</strong>). ${currentData.pembahasan}`;
        pembBox.style.display = 'block';

        // Tampilkan tombol "Selanjutnya" untuk lanjut manual
        document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuiz++;
        if (currentQuiz < quizData.length) {
            loadQuiz();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-box').style.display = 'none';
        const resultBox = document.getElementById('result-box');
        resultBox.style.display = 'block';
        
        const percentage = Math.round((score / quizData.length) * 100);
        
        resultBox.innerHTML = `
            <h3>Selesai! 🎉</h3>
            <p>Hasil akhir kuis kepalangmerahan Anda:</p>
            <div class="score-num">${score} / ${quizData.length}</div>
            <p style="font-size: 1.1rem; font-weight: 500;">Akurasi Nilai: <strong>${percentage}%</strong></p>
            <button class="restart-btn" onclick="location.reload()">Ulangi Kuis</button>
        `;
    }
</script>
